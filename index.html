<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FaSt-Doku</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <meta name="theme-color" content="#3f7f63">
  <meta name="robots" content="noindex,nofollow">

  <style>
    :root{
      --bg:#f4f8f6;
      --card:#ffffff;
      --text:#1f2a24;
      --muted:#5f6f66;
      --header:#3f7f63;
      --primary:#4caf7a;
      --danger:#b91c1c;
      --border:#d7e5dd;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header{
      background:var(--header);
      color:#fff;
      padding:16px 18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .brand{
      font-size:20px;
      font-weight:700;
    }

    .header-actions button{
      width:auto;
      margin-top:0;
      padding:10px 14px;
    }

    main{
      max-width:760px;
      margin:0 auto;
      padding:28px 18px 40px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:22px;
      box-shadow:0 10px 26px rgba(31,42,36,0.08);
      margin-bottom:16px;
    }

    h1,h2,h3{ margin-top:0; }
    p{ line-height:1.45; }

    label{
      display:block;
      margin-top:14px;
      margin-bottom:6px;
      font-weight:600;
    }

    input,
    select,
    textarea{
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid var(--border);
      font-size:16px;
      background:#fff;
      box-sizing:border-box;
      appearance:none;
      -webkit-appearance:none;
    }

    textarea{
      min-height:120px;
      resize:vertical;
      font-family:inherit;
      line-height:1.4;
    }

    button{
      width:100%;
      padding:12px 14px;
      border:none;
      border-radius:12px;
      background:var(--primary);
      color:#fff;
      font-size:15px;
      font-weight:600;
      cursor:pointer;
      margin-top:16px;
    }

    button.secondary{
      background:#6e8f7f;
    }

    button.danger{
      background:var(--danger);
    }


    button:hover{
      background:#43a56f;
    }

    button.secondary:hover{
      background:#5f7f70;
    }

    input:focus,
    select:focus,
    textarea:focus{
      outline:none;
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(76,175,122,.14);
    }

    .muted{
      color:var(--muted);
      font-size:14px;
    }

    .error{
      margin-top:12px;
      color:var(--danger);
      font-weight:600;
    }

    .success{
      margin-top:12px;
      color:#2f6d52;
      font-weight:600;
    }

    .row{
      display:flex;
      gap:12px;
    }

    .row > *{
      flex:1;
    }

    .pill{
      display:inline-block;
      font-size:12px;
      background:#e3efe8;
      color:#355345;
      padding:4px 8px;
      border-radius:999px;
      margin-right:6px;
    }

    pre.log{
      background:#234535;
      color:#edf5f1;
      border-radius:12px;
      padding:14px;
      overflow:auto;
      font-size:12px;
      line-height:1.4;
      white-space:pre-wrap;
    }

.pill-green{
  display:inline-block;
  font-size:12px;
  background:#dcfce7;
  color:#2f6d52;
  padding:4px 8px;
  border-radius:999px;
  margin-right:6px;
}

.pill-orange{
  display:inline-block;
  font-size:12px;
  background:#ffedd5;
  color:#c2410c;
  padding:4px 8px;
  border-radius:999px;
  margin-right:6px;
}

.pill-red{
  display:inline-block;
  font-size:12px;
  background:#fee2e2;
  color:#b91c1c;
  padding:4px 8px;
  border-radius:999px;
  margin-right:6px;
}

.pill-gray{
  display:inline-block;
  font-size:12px;
  background:#e1ece6;
  color:#44584d;
  padding:4px 8px;
  border-radius:999px;
  margin-right:6px;
}

.pill-blue{
  display:inline-block;
  font-size:12px;
  background:#e2f2e8;
  color:#2f6d52;
  padding:4px 8px;
  border-radius:999px;
  margin-right:6px;
}

.accordion{
  border:1px solid var(--border);
  border-radius:14px;
  background:#fff;
  margin-bottom:12px;
  overflow:hidden;
}

.accordion summary{
  list-style:none;
  cursor:pointer;
  padding:14px 16px;
  font-weight:600;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#e3efe8;
  color:#2d4538;
  font-weight:600;
  transition:background .2s ease;
}

.accordion summary:hover{
  background:#d4e6dd;
}

.accordion summary::-webkit-details-marker{
  display:none;
}

.accordion-body{
  padding:14px 16px;
  border-top:1px solid var(--border);
}

.compact-card{
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
  background:#fff;
}

.compact-meta{
  font-size:13px;
  color:var(--muted);
  line-height:1.45;
}



    .action-row-wrap{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .action-row-wrap > *{
      flex:1 1 160px;
      min-width:0;
    }

    .checkbox-row{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
    }

    .check-chip{
      display:flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border:1px solid var(--border);
      border-radius:12px;
      background:#fff;
      font-weight:600;
      cursor:pointer;
      flex:1 1 180px;
      min-width:0;
    }

    .check-chip input[type="checkbox"]{
      width:auto !important;
      margin:0;
      cursor:pointer;
      transform:scale(1.15);
      accent-color: var(--primary);
      flex:0 0 auto;
    }

    .check-chip.is-checked{
      background: rgba(76,175,122,.12);
      border-color: var(--primary);
      box-shadow: inset 0 0 0 1px rgba(76,175,122,.22);
    }

    
    .compact-card.selectable-card{
      transition: background .15s ease, border-color .15s ease, box-shadow .15s ease;
      cursor:pointer;
    }

    .compact-card.selectable-card.is-selected{
      background: rgba(76,175,122,.12);
      border-color: var(--primary);
      box-shadow: inset 0 0 0 1px rgba(76,175,122,.22);
    }

.inline-action-stack{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .inline-action-stack > *{
      flex:1 1 180px;
      min-width:0;
    }
.list-stack{
  display:flex;
  flex-direction:column;
  gap:10px;
}
  </style>
</head>
<body>
  <header>
    <div class="brand">FaSt-Doku</div>
    <div class="header-actions">
      <button id="lockBtn" class="secondary" style="display:none;">Sperren</button>
    </div>
  </header>

  <main id="app"></main>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch(err => {
        console.error("Service Worker Fehler:", err);
      });
    }
  </script>

  <script src="./zip-full.min.js"></script>
  <script type="module" src="./core/boot.js"></script>
</body>
</html>
